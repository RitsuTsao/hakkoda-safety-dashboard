<!doctype html>
<html lang="zh-Hant">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="theme-color" content="#1f4f46">
    <link rel="manifest" href="./manifest.webmanifest">
    <title>Hakkoda Safety Dashboard</title>
    <style>
      :root {
        color-scheme: light;
        --bg: #f5f2ec;
        --panel: #ffffff;
        --panel-soft: #eef4f1;
        --text: #17201d;
        --muted: #60706b;
        --line: #d8ddd7;
        --green: #247a52;
        --yellow: #9a6a00;
        --red: #b3261e;
        --blue: #245d8f;
        --ink: #1f4f46;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        background: var(--bg);
        color: var(--text);
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        line-height: 1.5;
      }

      main {
        width: min(1040px, 100%);
        margin: 0 auto;
        padding: 16px;
      }

      header {
        display: grid;
        gap: 10px;
        padding: 8px 0 14px;
      }

      h1,
      h2,
      h3 {
        margin: 0;
        letter-spacing: 0;
      }

      h1 {
        font-size: 1.55rem;
        line-height: 1.15;
      }

      h2 {
        font-size: 1.03rem;
      }

      h3 {
        font-size: 0.96rem;
      }

      p {
        margin: 0;
      }

      a {
        color: inherit;
        text-decoration: none;
      }

      button {
        font: inherit;
      }

      .muted {
        color: var(--muted);
        font-size: 0.9rem;
      }

      .panel {
        background: var(--panel);
        border: 1px solid var(--line);
        border-radius: 8px;
        padding: 14px;
      }

      .grid {
        display: grid;
        gap: 12px;
      }

      @media (min-width: 820px) {
        .grid.overview {
          grid-template-columns: 1fr 1fr;
        }

        .grid.region-layout {
          grid-template-columns: minmax(0, 1fr) 330px;
          align-items: start;
        }
      }

      .status-line {
        display: flex;
        align-items: flex-start;
        gap: 10px;
      }

      .badge {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        min-width: 48px;
        min-height: 30px;
        border-radius: 6px;
        color: #fff;
        font-weight: 750;
      }

      .green {
        background: var(--green);
      }

      .yellow {
        background: var(--yellow);
      }

      .red {
        background: var(--red);
      }

      .stale {
        border-color: #d39a27;
        background: #fff8e5;
      }

      .tabs {
        position: sticky;
        top: 0;
        z-index: 3;
        display: grid;
        grid-template-columns: repeat(3, minmax(0, 1fr));
        gap: 6px;
        padding: 8px 0;
        background: var(--bg);
      }

      .tab {
        min-height: 44px;
        border: 1px solid var(--line);
        border-radius: 8px;
        background: var(--panel);
        color: var(--text);
        font-weight: 750;
      }

      .tab[aria-selected="true"] {
        border-color: var(--ink);
        background: var(--ink);
        color: #fff;
      }

      .section-head {
        display: flex;
        justify-content: space-between;
        gap: 10px;
        align-items: center;
        margin-bottom: 10px;
      }

      .focus-list,
      .notes-list {
        margin: 8px 0 0;
        padding-left: 18px;
      }

      .quick-grid {
        display: grid;
        grid-template-columns: repeat(2, minmax(0, 1fr));
        gap: 8px;
      }

      @media (min-width: 620px) {
        .quick-grid {
          grid-template-columns: repeat(3, minmax(0, 1fr));
        }
      }

      .quick-link {
        display: grid;
        gap: 3px;
        min-height: 72px;
        padding: 10px;
        border: 1px solid var(--line);
        border-radius: 8px;
        background: #fff;
      }

      .quick-link strong {
        color: var(--blue);
        font-size: 0.96rem;
      }

      .quick-link span {
        color: var(--muted);
        font-size: 0.82rem;
      }

      .scenario {
        display: grid;
        gap: 6px;
        padding: 12px 0;
        border-top: 1px solid var(--line);
      }

      .scenario:first-child {
        border-top: 0;
        padding-top: 0;
      }

      .scenario-title {
        display: flex;
        align-items: center;
        gap: 8px;
      }

      .severity {
        min-width: 42px;
        padding: 3px 7px;
        border-radius: 5px;
        color: #fff;
        font-size: 0.78rem;
        font-weight: 750;
        text-align: center;
      }

      .footer-note {
        margin-top: 12px;
        color: var(--muted);
        font-size: 0.84rem;
      }
    </style>
  </head>
  <body>
    <main>
      <header>
        <h1>Hakkoda Safety Dashboard</h1>
        <p class="muted">北東北區域風險儀表板。即時警報以官方 App、旅館與現地指示為準。</p>
      </header>

      <section class="grid overview">
        <article class="panel" id="overallPanel">
          <div class="section-head">
            <h2>總覽</h2>
            <span id="overallBadge" class="badge yellow">待查</span>
          </div>
          <p id="overallText">等待資料載入。</p>
          <p id="updated" class="muted">讀取資料中...</p>
          <ul id="summary" class="notes-list"></ul>
        </article>

        <article class="panel">
          <div class="section-head">
            <h2>立即確認</h2>
          </div>
          <div id="urgentLinks" class="quick-grid"></div>
        </article>
      </section>

      <nav id="regionTabs" class="tabs" aria-label="區域"></nav>

      <section id="regionPanel" class="grid region-layout"></section>

      <p class="footer-note">這個頁面會嘗試讀取最新資料；離線時會保留最後一次成功快取的內容。</p>
    </main>

    <script>
      const badgeClass = {
        green: "green",
        yellow: "yellow",
        red: "red"
      };

      const severityClass = {
        green: "green",
        yellow: "yellow",
        red: "red"
      };

      let dashboardData;
      let activeRegionId;

      function labelFor(level) {
        if (level === "green") return "綠";
        if (level === "red") return "紅";
        return "黃";
      }

      function escapeHtml(value) {
        return String(value)
          .replaceAll("&", "&amp;")
          .replaceAll("<", "&lt;")
          .replaceAll(">", "&gt;")
          .replaceAll('"', "&quot;");
      }

      function renderQuickLink(link) {
        const safeTitle = escapeHtml(link.title);
        const safeNote = escapeHtml(link.note || link.category || "");
        return `
          <a class="quick-link" href="${encodeURI(link.url)}" target="_blank" rel="noopener">
            <strong>${safeTitle}</strong>
            <span>${safeNote}</span>
          </a>
        `;
      }

      function renderTabs() {
        const tabs = document.getElementById("regionTabs");
        tabs.innerHTML = dashboardData.regions
          .map((region) => {
            const selected = region.id === activeRegionId ? "true" : "false";
            return `<button class="tab" type="button" data-region="${escapeHtml(region.id)}" aria-selected="${selected}">${escapeHtml(region.title)}</button>`;
          })
          .join("");

        tabs.querySelectorAll("button").forEach((button) => {
          button.addEventListener("click", () => {
            activeRegionId = button.dataset.region;
            location.hash = activeRegionId;
            renderTabs();
            renderRegion();
          });
        });
      }

      function renderRegion() {
        const region = dashboardData.regions.find((item) => item.id === activeRegionId) || dashboardData.regions[0];
        const panel = document.getElementById("regionPanel");
        const quickLinks = region.quickLinks || region.links || [];
        const scenarios = region.scenarios || [];
        const focus = region.focus || [];

        panel.innerHTML = `
          <article class="panel">
            <div class="section-head">
              <h2>${escapeHtml(region.title)}</h2>
              <span class="badge ${badgeClass[region.level] || "yellow"}">${labelFor(region.level)}</span>
            </div>
            <p>${escapeHtml(region.guidance)}</p>
            <ul class="focus-list">
              ${focus.map((item) => `<li>${escapeHtml(item)}</li>`).join("")}
            </ul>
          </article>

          <article class="panel">
            <div class="section-head">
              <h2>快速按鈕</h2>
            </div>
            <div class="quick-grid">
              ${quickLinks.map(renderQuickLink).join("")}
            </div>
          </article>

          <article class="panel" style="grid-column: 1 / -1;">
            <div class="section-head">
              <h2>紅色情境</h2>
            </div>
            ${scenarios.map((scenario) => `
              <section class="scenario">
                <div class="scenario-title">
                  <span class="severity ${severityClass[scenario.severity] || "red"}">${labelFor(scenario.severity || "red")}</span>
                  <h3>${escapeHtml(scenario.title)}</h3>
                </div>
                <p>${escapeHtml(scenario.action)}</p>
              </section>
            `).join("")}
          </article>
        `;
      }

      function isStale(generatedAt) {
        const parsed = Date.parse(generatedAt);
        if (Number.isNaN(parsed)) return true;
        return Date.now() - parsed > 18 * 60 * 60 * 1000;
      }

      async function loadData() {
        const response = await fetch("./data.json", { cache: "no-store" });
        dashboardData = await response.json();
        activeRegionId = location.hash.replace("#", "") || dashboardData.regions[0].id;

        const stale = isStale(dashboardData.generatedAt);
        const overallPanel = document.getElementById("overallPanel");
        overallPanel.classList.toggle("stale", stale);

        document.getElementById("updated").textContent = stale
          ? `最後更新：${dashboardData.generatedAt} / 舊資料，請手動確認官方來源`
          : `最後更新：${dashboardData.generatedAt} / ${dashboardData.sourceMode}`;

        const badge = document.getElementById("overallBadge");
        badge.className = `badge ${badgeClass[dashboardData.overall.level] || "yellow"}`;
        badge.textContent = labelFor(dashboardData.overall.level);
        document.getElementById("overallText").textContent = dashboardData.overall.message;

        document.getElementById("summary").innerHTML = dashboardData.overall.notes
          .map((note) => `<li>${escapeHtml(note)}</li>`)
          .join("");

        document.getElementById("urgentLinks").innerHTML = dashboardData.urgentLinks
          .map(renderQuickLink)
          .join("");

        renderTabs();
        renderRegion();
      }

      if ("serviceWorker" in navigator) {
        navigator.serviceWorker.register("./service-worker.js");
      }

      loadData().catch(() => {
        document.getElementById("updated").textContent = "資料讀取失敗。若離線，請稍後再開；若在線，請重新整理。";
      });
    </script>
  </body>
</html>
